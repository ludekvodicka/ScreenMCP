name: Bug report
description: Report a reproducible ScreenMCP problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not post endpoint tokens, private screen content, or vulnerability details. Use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: ScreenMCP version and package
      placeholder: 0.1.0, Windows Setup
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, macOS, Linux X11, Linux Wayland]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized diagnostics
      description: Remove tokens, paths, window titles, and captured content.
