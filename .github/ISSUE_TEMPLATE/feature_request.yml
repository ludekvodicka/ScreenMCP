name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and platform impact
      description: Explain any change to what the model sees, permissions, persistence, or supported platforms.
